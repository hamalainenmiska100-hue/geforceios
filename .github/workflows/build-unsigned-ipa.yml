name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: unsigned-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show environment details
        run: |
          set -euo pipefail
          sw_vers
          xcodebuild -version
          xcrun simctl list devices | sed -n "1,20p"

      - name: Validate project and scheme
        run: |
          set -euo pipefail
          test -f GeForceNOWiOS.xcodeproj/project.pbxproj
          xcodebuild -list -project GeForceNOWiOS.xcodeproj
          xcodebuild -showBuildSettings \
            -project GeForceNOWiOS.xcodeproj \
            -scheme GeForceNOWiOS \
            -configuration Release > /tmp/build-settings.txt
          grep -q "PRODUCT_BUNDLE_IDENTIFIER" /tmp/build-settings.txt
          grep -q "INFOPLIST_FILE" /tmp/build-settings.txt

      - name: Validate Info.plist required keys
        run: |
          set -euo pipefail
          PLIST="GeForceNOWiOS/Info.plist"
          test -f "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleName" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundlePackageType" "$PLIST"

      - name: Build archive without signing (attempt 1)
        id: build1
        continue-on-error: true
        run: |
          set -euo pipefail
          xcodebuild \
            -project GeForceNOWiOS.xcodeproj \
            -scheme GeForceNOWiOS \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/GeForceNOWiOS.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            clean archive

      - name: Auto-recovery clean build (attempt 2)
        if: steps.build1.outcome != 'success'
        run: |
          set -euo pipefail
          echo "First build failed. Attempting automatic cleanup + rebuild..."
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf "$PWD/build"
          xcodebuild \
            -project GeForceNOWiOS.xcodeproj \
            -scheme GeForceNOWiOS \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/GeForceNOWiOS.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            clean archive

      - name: Verify archive contents
        run: |
          set -euo pipefail
          APP_PATH="build/GeForceNOWiOS.xcarchive/Products/Applications/GeForceNOWiOS.app"
          test -d "$APP_PATH"
          test -f "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist"

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          mkdir -p build/Payload
          cp -R build/GeForceNOWiOS.xcarchive/Products/Applications/GeForceNOWiOS.app build/Payload/
          cd build
          /usr/bin/zip -r GeForceNOWiOS-unsigned.ipa Payload

      - name: Validate IPA layout
        run: |
          set -euo pipefail
          test -f build/GeForceNOWiOS-unsigned.ipa
          unzip -l build/GeForceNOWiOS-unsigned.ipa | grep -q "Payload/GeForceNOWiOS.app/Info.plist"
          unzip -l build/GeForceNOWiOS-unsigned.ipa | grep -q "Payload/GeForceNOWiOS.app/GeForceNOWiOS"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeForceNOWiOS-unsigned-ipa
          path: build/GeForceNOWiOS-unsigned.ipa
          if-no-files-found: error
